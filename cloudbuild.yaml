substitutions:
  _ENV: "staging"
  _PROJECT: "${PROJECT_ID}"
  _EMAIL: "devops@example.com"

steps:

  # ── 1. Validar formato y sintaxis ────────────────────────────
  - id: "validate"
    name: "hashicorp/terraform:1.6.5"
    entrypoint: sh
    args:
      - -c
      - |
        cd terraform
        terraform fmt -check
        terraform init -backend=false
        terraform validate

  # ── 2. Escaneo de seguridad IaC (DevSecOps) ──────────────────
  - id: "security-scan"
    name: "aquasec/tfsec:latest"
    args: ["terraform/", "--minimum-severity=HIGH"]
    waitFor: ["validate"]

  # ── 3. Terraform Plan ────────────────────────────────────────
  - id: "plan"
    name: "hashicorp/terraform:1.6.5"
    entrypoint: sh
    args:
      - -c
      - |
        cd terraform
        terraform init \
          -backend-config="bucket=tf-state-datalake" \
          -backend-config="prefix=terraform/state/${_ENV}"
        terraform plan \
          -var="project_id=${_PROJECT}" \
          -var="environment=${_ENV}" \
          -var="alert_email=${_EMAIL}" \
          -out=tfplan.bin
    waitFor: ["security-scan"]

  # ── 4. Terraform Apply ───────────────────────────────────────
  - id: "apply"
    name: "hashicorp/terraform:1.6.5"
    entrypoint: sh
    args:
      - -c
      - |
        cd terraform
        terraform apply -auto-approve tfplan.bin
    waitFor: ["plan"]

  # ── 5. Smoke tests ───────────────────────────────────────────
  - id: "verify"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: bash
    args:
      - -c
      - |
        gsutil ls gs://datalake-raw-${_ENV}       || exit 1
        gsutil ls gs://datalake-processed-${_ENV} || exit 1
        gsutil ls gs://datalake-curated-${_ENV}   || exit 1
        bq ls --project_id=${_PROJECT} data_mart_${_ENV} || exit 1
        echo "Despliegue verificado OK"
    waitFor: ["apply"]

timeout: "900s"
